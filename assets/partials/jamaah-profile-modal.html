<!-- Jamaah Profile Modal -->
<div id="jamaah-profile-modal" class="modal-bg hidden">
  <div class="modal-box">
    <div class="p-5 border-b border-gray-100 flex items-center gap-3">
      <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-xl">👤</div>
      <div><h3 class="font-bold text-gray-800">Profil Jamaah</h3><p class="text-xs text-gray-500">Kelola data akun jamaah</p></div>
      <button onclick="closeJamaahProfile()" class="ml-auto text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100" style="border:none;cursor:pointer;background:none;font-size:1rem;"><i class="fas fa-times"></i></button>
    </div>
    <div class="p-5 space-y-3">
      <div class="profile-preview-card">
        <div id="profile-avatar-preview" class="profile-avatar-preview"></div>
        <div>
          <p id="profile-preview-name" class="font-bold text-gray-800">Nama Jamaah</p>
          <p id="profile-preview-email" class="text-xs text-gray-500">email@jamaah.com</p>
        </div>
      </div>
      <input id="profile-name" class="input-field" placeholder="Nama jamaah">
      <input id="profile-email" class="input-field" placeholder="Email">
      <input id="profile-phone" class="input-field" placeholder="Nomor telepon / WhatsApp">
      <input id="profile-photo" class="input-field" placeholder="URL foto profil (opsional)">
      <div class="grid grid-cols-2 gap-2">
        <div class="profile-stat-card">
          <p class="text-[11px] uppercase tracking-widest text-gray-500 font-bold">Total Donasi</p>
          <p id="profile-total-donation" class="text-lg font-black text-emerald-700">Rp 0</p>
        </div>
        <div class="profile-stat-card">
          <p class="text-[11px] uppercase tracking-widest text-gray-500 font-bold">Jumlah Transaksi</p>
          <p id="profile-total-transactions" class="text-lg font-black text-emerald-700">0</p>
        </div>
      </div>
      <div class="profile-section-card">
        <p class="text-[11px] uppercase tracking-widest text-emerald-600 font-bold mb-2">Masjid Dipilih</p>
        <div id="profile-selected-mosque" class="space-y-2"></div>
      </div>
      <div class="profile-section-card">
        <div class="flex items-center justify-between gap-2 mb-2">
          <p class="text-[11px] uppercase tracking-widest text-emerald-600 font-bold">Riwayat Donasi</p>
          <button onclick="navigate('riwayat');closeJamaahProfile()" class="text-xs text-emerald-600 font-semibold hover:underline" style="background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;">Lihat Semua</button>
        </div>
        <div id="profile-donation-history" class="space-y-2"></div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <button onclick="saveJamaahProfile()" class="btn-primary w-full py-3">Simpan Profil</button>
        <button onclick="logoutFromProfile()" class="btn-outline w-full py-3">Logout</button>
      </div>
    </div>
  </div>
</div>
